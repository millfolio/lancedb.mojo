$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'library'
tags: ['mojo']

tasks:
  check:
    command: 'pixi run test-all'
    toolchain: 'system'
    inputs: ['src/**/*', 'ffi/**/*', 'test/**/*', 'pixi.toml', 'pixi.lock']
    # Serialize with vault:build — both run lancedb's ffi/build.sh, which writes the
    # same liblancedbmojo.dylib; building it concurrently corrupts it (install_name_tool
    # Bus error → "load command extends beyond end of file" dlopen failure).
    options:
      mutex: 'lancedb-shim'
